<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>For You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #0a0a1a;
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* ===== 主题色背景光晕 ===== */
    .theme-glow {
      position: fixed;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 150%;
      height: 100%;
      background: radial-gradient(ellipse at center, var(--c1) 0%, transparent 50%);
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 4s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.08; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.12; transform: translateX(-50%) scale(1.05); }
    }

    /* ===== 顶部主题色渐变条 ===== */
    .theme-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--c1), var(--c2), var(--c1));
      background-size: 200% 100%;
      z-index: 1000;
      animation: barShimmer 3s linear infinite;
    }
    @keyframes barShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* ===== 交互画布（星空+点击粒子） ===== */
    #stars-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ===== 主容器 ===== */
    .main {
      position: relative; z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ===== 爱心跳动（CSS心形） ===== */
    .heart-wrapper { text-align: center; margin-bottom: 32px; }
    .heart {
      display: inline-block;
      position: relative;
      width: 64px; height: 58px;
      animation: heartbeat 1.2s infinite;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      top: 0;
      width: 32px;
      height: 52px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      border-radius: 32px 32px 0 0;
      box-shadow: 0 0 30px var(--glow);
    }
    .heart::before {
      left: 32px;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }
    .heart::after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }
    .heart:active { transform: scale(1.4); }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
    }

    /* ===== 标题区 ===== */
    .title-section { text-align: center; margin-bottom: 48px; }
    .title {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, var(--c1), var(--c2), var(--c1));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 3s ease infinite;
      margin-bottom: 12px;
    }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 4px; }
    .random-quote {
      margin-top: 16px; font-size: 13px;
      color: rgba(255,255,255,0.45); font-style: italic;
      letter-spacing: 1px; min-height: 20px;
      transition: opacity 0.5s;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ===== 计时器卡片 ===== */
    .counter-card {
      background: linear-gradient(135deg, rgba(var(--cr1),0.15), rgba(var(--cr2),0.08));
      border: 1px solid rgba(var(--cr1),0.2);
      border-radius: 20px;
      padding: 28px 20px; text-align: center;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
    }
    .counter-label { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px; letter-spacing: 2px; }
    .counter-nums { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
    .counter-item { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 6px; min-width: 60px; }
    .counter-num { font-size: 32px; font-weight: 700; color: var(--c1); line-height: 1.2; }
    .counter-unit { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .counter-date { font-size: 12px; color: rgba(255,255,255,0.35); }

    /* ===== 照片墙 ===== */
    .photo-section { margin-bottom: 40px; }
    .section-title {
      font-size: 16px; color: rgba(255,255,255,0.7);
      text-align: center; margin-bottom: 20px; letter-spacing: 3px;
    }
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .photo-item {
      position: relative; border-radius: 14px; overflow: hidden;
      aspect-ratio: 1; background: linear-gradient(135deg, rgba(var(--cr1),0.1), rgba(100,100,200,0.1));
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .photo-item:hover, .photo-item:active {
      transform: scale(1.03);
      box-shadow: 0 8px 32px rgba(var(--cr1),0.3);
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }

    /* ===== 打字机文字 ===== */
    .message-section { margin-bottom: 40px; }
    .message-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 28px 22px;
      line-height: 2; font-size: 15px; color: rgba(255,255,255,0.8);
      min-height: 180px;
    }
    .typewriter-cursor {
      display: inline-block; width: 2px; height: 18px;
      background: var(--c1); margin-left: 2px;
      vertical-align: text-bottom; animation: blink 0.8s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ===== 互动按钮组 ===== */
    .action-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 40px;
    }
    .action-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px 12px; gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; color: #fff;
      font-size: 13px; cursor: pointer;
      transition: all 0.3s ease;
    }
    .action-btn:hover, .action-btn:active {
      background: rgba(var(--cr1),0.15);
      border-color: rgba(var(--cr1),0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(var(--cr1),0.2);
    }
    .action-btn .icon { font-size: 28px; }
    .action-btn span { letter-spacing: 1px; }

    /* ===== 爱情抽签 ===== */
    .fortune-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 200;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .fortune-overlay.show { display: flex; }
    .fortune-card {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(var(--cr1),0.3);
      border-radius: 24px; padding: 40px 32px;
      max-width: 320px; text-align: center;
      animation: cardIn 0.5s ease-out;
      position: relative;
    }
    .fortune-card .label { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 4px; margin-bottom: 20px; }
    .fortune-card .content { font-size: 18px; line-height: 1.8; color: rgba(255,255,255,0.9); margin-bottom: 24px; }
    .fortune-card .tag {
      display: inline-block; padding: 4px 16px;
      background: rgba(var(--cr1),0.2); border-radius: 20px;
      font-size: 12px; color: var(--c1);
    }
    .fortune-card .close-btn {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; color: rgba(255,255,255,0.3);
      font-size: 20px; cursor: pointer;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.8) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ===== 记忆翻牌游戏 ===== */
    .game-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 200;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); flex-direction: column;
    }
    .game-overlay.show { display: flex; }
    .game-header {
      color: rgba(255,255,255,0.8); margin-bottom: 20px;
      text-align: center;
    }
    .game-header h3 { font-size: 20px; margin-bottom: 8px; }
    .game-stats { font-size: 13px; color: rgba(255,255,255,0.5); }
    .game-board {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px; max-width: 300px;
    }
    .game-card-cell {
      width: 68px; height: 68px; perspective: 600px; cursor: pointer;
    }
    .game-card-inner {
      width: 100%; height: 100%; position: relative;
      transition: transform 0.5s; transform-style: preserve-3d;
    }
    .game-card-cell.flipped .game-card-inner { transform: rotateY(180deg); }
    .game-card-cell.matched .game-card-inner { transform: rotateY(180deg); }
    .game-card-cell.matched { opacity: 0.7; pointer-events: none; }
    .game-card-front, .game-card-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .game-card-front {
      background: linear-gradient(135deg, rgba(var(--cr1),0.3), rgba(var(--cr2),0.2));
      border: 1px solid rgba(var(--cr1),0.3);
      color: var(--c1); font-size: 20px;
    }
    .game-card-back { background: rgba(255,255,255,0.06); transform: rotateY(180deg); }
    .game-close {
      margin-top: 20px; padding: 10px 32px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; color: #fff; cursor: pointer; font-size: 13px;
    }
    .game-win {
      display: none; text-align: center;
      animation: cardIn 0.5s ease-out;
    }
    .game-win.show { display: block; }
    .game-win h3 { font-size: 24px; margin-bottom: 8px; }
    .game-win p { color: rgba(255,255,255,0.5); font-size: 14px; }

    /* ===== 漂流瓶 ===== */
    .bottle-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 200;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .bottle-overlay.show { display: flex; }
    .bottle-panel {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(var(--cr1),0.3);
      border-radius: 24px; padding: 32px 24px;
      max-width: 340px; width: 90%;
      animation: cardIn 0.5s ease-out;
    }
    .bottle-panel h3 { text-align: center; font-size: 18px; margin-bottom: 6px; }
    .bottle-panel .desc { text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .bottle-textarea {
      width: 100%; min-height: 100px; padding: 14px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: #fff; font-size: 14px;
      resize: none; outline: none; font-family: inherit; line-height: 1.6;
    }
    .bottle-textarea::placeholder { color: rgba(255,255,255,0.25); }
    .bottle-actions { display: flex; gap: 10px; margin-top: 16px; }
    .bottle-actions button {
      flex: 1; padding: 10px; border-radius: 12px;
      border: none; cursor: pointer; font-size: 13px;
      transition: all 0.3s;
    }
    .bottle-send {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: #fff; font-weight: 600;
    }
    .bottle-read {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15) !important;
    }
    .bottle-close {
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
    }
    .bottle-history {
      margin-top: 16px; max-height: 200px; overflow-y: auto;
      display: none;
    }
    .bottle-history.show { display: block; }
    .bottle-msg {
      background: rgba(255,255,255,0.04); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 8px;
      font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.6;
    }
    .bottle-msg .time { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 6px; }

    /* ===== 烟花按钮 ===== */
    .firework-btn-wrapper { text-align: center; margin-bottom: 40px; }
    .firework-btn {
      display: inline-block; padding: 14px 40px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      border: none; border-radius: 50px;
      color: #fff; font-size: 16px; font-weight: 600;
      letter-spacing: 2px; cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(var(--cr1),0.4);
    }
    .firework-btn:hover, .firework-btn:active {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(var(--cr1),0.6);
    }

    /* ===== 烟花画布 ===== */
    #firework-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 100; pointer-events: none; display: none;
    }

    /* ===== 漂浮爱心 ===== */
    .floating-hearts {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none; overflow: hidden;
    }
    .f-heart {
      position: absolute; bottom: -30px; font-size: 18px; opacity: 0;
      animation: floatUp linear forwards;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.5); }
      10% { opacity: 0.7; }
      90% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-110vh) rotate(720deg) scale(1.2); }
    }

    /* ===== 底部签名 ===== */
    .footer { text-align: center; padding: 20px 0; color: rgba(255,255,255,0.2); font-size: 12px; letter-spacing: 2px; }

    /* ===== 通用动画 ===== */
    .fade-section { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
    .fade-section.visible { opacity: 1; transform: translateY(0); }

    /* ===== 点击涟漪提示 ===== */
    .tap-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.25);
      z-index: 1; letter-spacing: 2px;
      animation: hintPulse 2s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>

<!-- 顶部主题色渐变条 -->
<div class="theme-bar"></div>

<!-- 主题色背景光晕 -->
<div class="theme-glow"></div>

<!-- 星空+交互画布 -->
<canvas id="stars-canvas"></canvas>

<!-- 漂浮爱心 -->
<div class="floating-hearts" id="floating-hearts"></div>

<!-- 烟花画布 -->
<canvas id="firework-canvas"></canvas>

<!-- 点击提示 -->
<div class="tap-hint" id="tap-hint">轻触星空，试试看</div>

<!-- 主内容 -->
<div class="main">

  <!-- 爱心 -->
  <div class="heart-wrapper fade-section">
    <span class="heart" id="main-heart"></span>
  </div>

  <!-- 标题 -->
  <div class="title-section fade-section">
    <div class="title">瑶瑶，我爱你</div>
    <div class="subtitle">—— IS FOR YOU ——</div>
    <div class="random-quote" id="random-quote"></div>
  </div>

  <!-- 在一起计时器 -->
  <div class="counter-card fade-section">
    <div class="counter-label">我们已经在一起</div>
    <div class="counter-nums">
      <div class="counter-item">
        <div class="counter-num" id="counter-days">0</div>
        <div class="counter-unit">天</div>
      </div>
      <div class="counter-item">
        <div class="counter-num" id="counter-hours">0</div>
        <div class="counter-unit">时</div>
      </div>
      <div class="counter-item">
        <div class="counter-num" id="counter-mins">0</div>
        <div class="counter-unit">分</div>
      </div>
      <div class="counter-item">
        <div class="counter-num" id="counter-secs">0</div>
        <div class="counter-unit">秒</div>
      </div>
    </div>
    <div class="counter-date">since 2026-02-24</div>
  </div>

  <!-- 照片墙 -->
  <div class="photo-section fade-section">
    <div class="section-title">· 我们的留念，未完待续~ ·</div>
    <div class="photo-grid">
      <div class="photo-item">
        <img src="情1.png" alt="我们的纪念" loading="lazy">
      </div>
      <div class="photo-item">
        <img src="情2.png" alt="我们的纪念" loading="lazy">
      </div>
    </div>
  </div>

  <!-- 互动功能区 -->
  <div class="action-grid fade-section">
    <button class="action-btn" id="btn-fortune">
      <span class="icon">🔮</span>
      <span>今日甜蜜签</span>
    </button>
    <button class="action-btn" id="btn-game">
      <span class="icon">🎮</span>
      <span>爱的记忆</span>
    </button>
    <button class="action-btn" id="btn-bottle">
      <span class="icon">🍾</span>
      <span>悄悄话漂流瓶</span>
    </button>
    <button class="action-btn" id="btn-dice">
      <span class="icon">🎲</span>
      <span>今天吃什么</span>
    </button>
  </div>

  <!-- 表白文字（打字机效果） -->
  <div class="message-section fade-section">
    <div class="section-title">· 想对你说 ·</div>
    <div class="message-card">
      <span id="typewriter-text"></span>
      <span class="typewriter-cursor"></span>
    </div>
  </div>

  <!-- 放烟花按钮 -->
  <div class="firework-btn-wrapper fade-section">
    <button class="firework-btn" id="firework-btn">🎆 为你放一场烟花</button>
  </div>

  <div class="footer">♡ forever & always ♡</div>
</div>

<!-- 爱情抽签弹窗 -->
<div class="fortune-overlay" id="fortune-overlay">
  <div class="fortune-card">
    <button class="close-btn" id="fortune-close">&times;</button>
    <div class="label">—— 今日甜蜜签 ——</div>
    <div class="content" id="fortune-content"></div>
    <div class="tag" id="fortune-tag"></div>
  </div>
</div>

<!-- 记忆翻牌游戏弹窗 -->
<div class="game-overlay" id="game-overlay">
  <div class="game-header">
    <h3>💕 爱的记忆</h3>
    <div class="game-stats">翻牌次数：<span id="game-moves">0</span></div>
  </div>
  <div class="game-board" id="game-board"></div>
  <div class="game-win" id="game-win">
    <h3>🎉 完美配对!</h3>
    <p id="game-result"></p>
  </div>
  <button class="game-close" id="game-close">关闭</button>
</div>

<!-- 漂流瓶弹窗 -->
<div class="bottle-overlay" id="bottle-overlay">
  <div class="bottle-panel">
    <h3>🍾 悄悄话漂流瓶</h3>
    <div class="desc">写下想说的话，放入瓶中漂流~</div>
    <textarea class="bottle-textarea" id="bottle-input" placeholder="写点什么悄悄话吧..."></textarea>
    <div class="bottle-actions">
      <button class="bottle-send" id="bottle-send">放入瓶中 🌊</button>
      <button class="bottle-read" id="bottle-read">捞一个瓶子</button>
    </div>
    <div class="bottle-history" id="bottle-history"></div>
    <div class="bottle-actions" style="margin-top:10px">
      <button class="bottle-close" id="bottle-close">关闭</button>
    </div>
  </div>
</div>

<!-- 吃什么弹窗 -->
<div class="fortune-overlay" id="dice-overlay">
  <div class="fortune-card">
    <button class="close-btn" id="dice-close">&times;</button>
    <div class="label">—— 今天吃什么 ——</div>
    <div class="content" id="dice-content" style="font-size:36px"></div>
    <div class="tag" id="dice-tag"></div>
  </div>
</div>

<script>
  /* =============================
     配置区域
     ============================= */
  const TOGETHER_DATE = '2026-02-24';

  // 想对你说 - 文字片段库（每次随机显示一条）

    // 深情表白类

  /* ===========================
     星空 + 点击粒子
     =========================== */
  (function initStars() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [], shootingStars = [], clickParticles = [];
    const shootFreq = 0.003 + Math.random() * 0.008; // 随机流星频率

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    // 随机星星数量
    const starCount = 150 + Math.floor(Math.random() * 150);
    for (let i = 0; i < starCount; i++) {
      stars.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3, alpha: Math.random(),
        dAlpha: (Math.random() - 0.5) * 0.015
      });
    }

    function newShootingStar() {
      return {
        x: Math.random() * canvas.width * 0.7, y: Math.random() * canvas.height * 0.4,
        len: Math.random() * 60 + 40, speed: Math.random() * 6 + 4, alpha: 1
      };
    }

    // 点击/触摸产生粒子
    function spawnClickParticles(cx, cy) {
      const hue = Math.random() * 60 + 330;
      for (let i = 0; i < 20; i++) {
        const angle = (Math.PI * 2 / 20) * i;
        const speed = Math.random() * 3 + 1;
        clickParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          alpha: 1, size: Math.random() * 2 + 1,
          hue: hue + Math.random() * 30
        });
      }
      // 隐藏提示
      const hint = document.getElementById('tap-hint');
      if (hint) hint.style.display = 'none';
    }

    canvas.addEventListener('click', (e) => spawnClickParticles(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      spawnClickParticles(touch.clientX, touch.clientY);
    });

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      stars.forEach(s => {
        s.alpha += s.dAlpha;
        if (s.alpha > 1 || s.alpha < 0.1) s.dAlpha *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();
      });

      if (Math.random() < shootFreq) shootingStars.push(newShootingStar());
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const ss = shootingStars[i];
        ctx.beginPath();
        ctx.moveTo(ss.x, ss.y);
        ctx.lineTo(ss.x - ss.len * 0.7, ss.y - ss.len * 0.3);
        ctx.strokeStyle = `rgba(255,255,255,${ss.alpha})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ss.x += ss.speed; ss.y += ss.speed * 0.4; ss.alpha -= 0.015;
        if (ss.alpha <= 0) shootingStars.splice(i, 1);
      }

      // 点击粒子
      for (let i = clickParticles.length - 1; i >= 0; i--) {
        const p = clickParticles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.03; p.alpha -= 0.02;
        if (p.alpha <= 0) { clickParticles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        const [r, g, b] = hslToRgb(p.hue, 80, 60);
        ctx.fillStyle = `rgba(${r},${g},${b},${p.alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(animate);
    }
    animate();
  })();

  function hslToRgb(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); };
    return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
  }

  (function initGame() {
    const overlay = document.getElementById('game-overlay');
    const board = document.getElementById('game-board');
    const movesEl = document.getElementById('game-moves');
    const winEl = document.getElementById('game-win');
    const resultEl = document.getElementById('game-result');
    let cards = [], flipped = [], matched = 0, moves = 0, locked = false;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initBoard() {
      board.innerHTML = '';
      winEl.classList.remove('show');
      matched = 0; moves = 0; flipped = []; locked = false;
      movesEl.textContent = '0';
      // 随机选8个emoji中的4对
      const selected = shuffle([...GAME_EMOJIS]).slice(0, 4);
      cards = shuffle([...selected, ...selected]);
      cards.forEach((emoji, i) => {
        const cell = document.createElement('div');
        cell.className = 'game-card-cell';
        cell.dataset.index = i;
        cell.innerHTML = `<div class="game-card-inner">
          <div class="game-card-front">?</div>
          <div class="game-card-back">${emoji}</div>
        </div>`;
        cell.addEventListener('click', () => flipCard(cell, i));
        board.appendChild(cell);
      });
    }

    function flipCard(cell, idx) {
      if (locked || cell.classList.contains('flipped') || cell.classList.contains('matched')) return;
      cell.classList.add('flipped');
      flipped.push({ cell, idx });

      if (flipped.length === 2) {
        moves++; movesEl.textContent = moves;
        locked = true;
        const [a, b] = flipped;
        if (cards[a.idx] === cards[b.idx]) {
          a.cell.classList.add('matched');
          b.cell.classList.add('matched');
          matched += 2;
          flipped = []; locked = false;
          if (matched === cards.length) {
            setTimeout(() => {
              winEl.classList.add('show');
              resultEl.textContent = `用了 ${moves} 步完成配对`;
            }, 500);
          }
        } else {
          setTimeout(() => {
            a.cell.classList.remove('flipped');
            b.cell.classList.remove('flipped');
            flipped = []; locked = false;
          }, 700);
        }
      }
    }

    document.getElementById('btn-game').addEventListener('click', () => {
      initBoard();
      overlay.classList.add('show');
    });
    document.getElementById('game-close').addEventListener('click', () => overlay.classList.remove('show'));
  })();

  (function initFireworks() {
    const canvas = document.getElementById('firework-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [], animating = false;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    function explode(x, y) {
      const hue = Math.random() * 60 + 330;
      const count = 80 + Math.floor(Math.random() * 40);
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.2;
        const speed = Math.random() * 4 + 2;
        const [r, g, b] = hslToRgb(hue + Math.random() * 40, 80 + Math.random() * 20, 55 + Math.random() * 15);
        particles.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          alpha: 1, r, g, b, decay: 0.008 + Math.random() * 0.008,
          size: Math.random() * 2.5 + 1
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.alpha -= p.decay;
        if (p.alpha <= 0) { particles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
        ctx.fill();
      }
      if (particles.length > 0) {
        requestAnimationFrame(animate);
      } else {
        animating = false;
        canvas.style.display = 'none';
      }
    }

    document.getElementById('firework-btn').addEventListener('click', () => {
      canvas.style.display = 'block';
      let count = 0;
      const iv = setInterval(() => {
        explode(canvas.width * (0.2 + Math.random() * 0.6), canvas.height * (0.15 + Math.random() * 0.35));
        if (++count >= 8) clearInterval(iv);
      }, 350);
      if (!animating) { animating = true; animate(); }
    });
  })();

     =========================== */
  (function initEasterEgg2() {
    const secretCodes = ['爱', '橙', '宝', 'love', 'iloveyou', '宝贝', '亲爱的'];
    let inputBuffer = '';
    let triggered = false;

    function checkAndTrigger() {
      const matched = secretCodes.some(code => inputBuffer.includes(code.toLowerCase()) || inputBuffer.includes(code));
      if (matched && !triggered) {
        triggered = true;
        triggerSecretLove();
        setTimeout(() => { triggered = false; }, 10000);
        inputBuffer = '';
      }
    }

    // 英文键盘输入
    document.addEventListener('keydown', (e) => {
      if (e.key.length === 1) {
        inputBuffer += e.key.toLowerCase();
        if (inputBuffer.length > 30) {
          inputBuffer = inputBuffer.slice(-30);
        }
        checkAndTrigger();
      }
    });

    // 中文输入法支持
    document.addEventListener('compositionend', (e) => {
      inputBuffer += e.data;
      if (inputBuffer.length > 30) {
        inputBuffer = inputBuffer.slice(-30);
      }
      checkAndTrigger();
    });

    // 兼容更多输入方式
    document.addEventListener('input', (e) => {
      if (e.data) {
        inputBuffer += e.data;
        if (inputBuffer.length > 30) {
          inputBuffer = inputBuffer.slice(-30);
        }
        checkAndTrigger();
      }
    });

    function triggerSecretLove() {
      // 创建全屏告白效果
      const overlay = document.createElement('div');
      overlay.id = 'secret-overlay';
      overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.9);z-index:3000;display:flex;flex-direction:column;
        align-items:center;justify-content:center;animation:fadeIn 0.5s ease-out;`;
      overlay.innerHTML = `
        <div style="font-size:60px;margin-bottom:20px;animation:heartBeat 0.8s infinite;">💕</div>
        <div style="font-size:28px;font-weight:600;background:linear-gradient(135deg,var(--c1),var(--c2));
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;">
          你发现了隐藏彩蛋！
        </div>
        <div style="font-size:18px;color:rgba(255,255,255,0.8);text-align:center;line-height:2;max-width:80%;">
          你是我的心动，是我的唯一<br>
          每一天爱你多一点<br>
          💝 永远爱你 💝
        </div>
        <div style="margin-top:30px;font-size:13px;color:rgba(255,255,255,0.4);">
          点击任意位置关闭
        </div>
      `;
      document.body.appendChild(overlay);

      // 添加动画
      const style = document.createElement('style');
      style.textContent = `
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes heartBeat {
          0%,100%{transform:scale(1)}
          25%{transform:scale(1.1)}
          50%{transform:scale(1)}
          75%{transform:scale(1.15)}
        }
      `;
      document.head.appendChild(style);

      // 点击关闭
      overlay.addEventListener('click', () => {
        overlay.style.animation = 'fadeIn 0.3s ease-out reverse';
        setTimeout(() => overlay.remove(), 300);
      });
    }
  })();

  /* ===========================
     彩蛋3：长按标题触发告白气球
     =========================== */
  (function initEasterEgg3() {
    const title = document.querySelector('.title');
    let timer = null;

    title.style.userSelect = 'none';

    title.addEventListener('touchstart', () => {
      timer = setTimeout(() => {
        triggerBalloons();
      }, 2000);
    });

    title.addEventListener('touchend', () => {
      clearTimeout(timer);
    });

    title.addEventListener('mousedown', () => {
      timer = setTimeout(() => {
        triggerBalloons();
      }, 2000);
    });

    title.addEventListener('mouseup', () => {
      clearTimeout(timer);
    });

    title.addEventListener('mouseleave', () => {
      clearTimeout(timer);
    });

    function triggerBalloons() {
      const container = document.createElement('div');
      container.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1500;`;
      document.body.appendChild(container);

      const balloons = ['🎈','🎈','🎈','💕','💗','🎊','✨','🌟'];
      const messages = ['我爱你', '想你', '么么哒', '宝贝', '亲爱的'];

      for (let i = 0; i < 30; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          const isBalloon = Math.random() > 0.5;
          if (isBalloon) {
            el.textContent = balloons[Math.floor(Math.random() * balloons.length)];
            el.style.cssText = `position:absolute;left:${Math.random() * 100}%;bottom:-60px;
              font-size:${40 + Math.random() * 30}px;animation:floatUp ${4 + Math.random() * 3}s ease-out forwards;`;
          } else {
            el.textContent = messages[Math.floor(Math.random() * messages.length)];
            el.style.cssText = `position:absolute;left:${Math.random() * 100}%;bottom:-60px;
              font-size:${14 + Math.random() * 10}px;color:var(--c1);font-weight:600;
              animation:floatUp ${3 + Math.random() * 2}s ease-out forwards;`;
          }
          container.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, i * 100);
      }

      setTimeout(() => container.remove(), 8000);
    }

    // 添加动画样式
    const style = document.createElement('style');
    style.textContent = `
      @keyframes floatUp {
        0% { transform:translateY(0) scale(1); opacity:1; }
        100% { transform:translateY(-120vh) scale(0.8); opacity:0; }
      }
    `;
    document.head.appendChild(style);
  })();
</script>
